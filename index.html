<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endodoncia 2026 — Hospital Dr. Leonardo Guzmán Antofagasta</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#0B5876;--azul2:#09769F;--azul3:#0D82A9;
  --cel:#72CBE7;--cel2:#A1DAEB;--cel3:#D6EEF6;
  --turq:#4BBACC;--teal:#2DA8A8;
  --fondo:#EEF6FA;--borde:#C5DFE9;--texto:#0B4A6A;--suave:#6AAEC4;
  --verde:#0E7A5A;--verde-bg:#D1F0E5;
  --amber:#9A6200;--amber-bg:#FEF3CD;
  --rojo:#B83232;--rojo-bg:#FDECEA;
  --viol:#5B45B0;--viol-bg:#EDEAFB;
  --r:10px;
}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--fondo);color:var(--texto);font-size:13px;overflow-x:hidden}
.header{background:linear-gradient(135deg,var(--azul) 0%,var(--azul2) 55%,var(--teal) 100%);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-img{width:64px;height:64px;border-radius:12px;background:#fff;padding:5px;object-fit:contain;box-shadow:0 4px 16px rgba(0,0,0,0.25);flex-shrink:0}
.h-title{color:#fff;font-size:15px;font-weight:700;line-height:1.2}
.h-sub{color:var(--cel2);font-size:10px;margin-top:2px;letter-spacing:.05em}
.h-badge{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:3px 10px;color:#fff;font-size:10px;font-weight:600;margin-top:4px;display:inline-block}
.nav{background:#fff;border-bottom:1px solid var(--borde);display:flex;align-items:center;padding:0 16px;gap:0;overflow-x:auto;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(9,118,159,0.08)}
.tab{padding:11px 16px;font-size:12px;font-weight:500;color:var(--suave);cursor:pointer;border:none;border-bottom:2.5px solid transparent;background:none;white-space:nowrap;transition:all .15s;font-family:inherit}
.tab:hover{color:var(--azul2)}.tab.on{color:var(--azul);border-bottom-color:var(--turq);font-weight:700}
.tab-sep{width:1px;height:16px;background:var(--borde);margin:0 2px;flex-shrink:0}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px;padding-left:12px;flex-shrink:0}
.nav-r label{font-size:10px;font-weight:600;color:var(--suave);text-transform:uppercase;letter-spacing:.06em}
.nav-r select{font-family:inherit;font-size:12px;font-weight:600;color:var(--azul);background:#fff;border:1px solid var(--borde);border-radius:7px;padding:5px 10px;cursor:pointer;outline:none}
.sec-tabs{display:flex;gap:0;border-bottom:1px solid var(--borde);background:#fff;padding:0 16px;overflow-x:auto}
.stab{padding:9px 16px;font-size:11px;font-weight:600;color:var(--suave);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;margin-bottom:-1px;font-family:inherit}
.stab:hover{color:var(--azul2)}.stab.on{color:var(--azul);border-bottom-color:var(--cel)}
.main{padding:20px 16px 40px;max-width:1100px;margin:0 auto}
.slabel{font-size:9.5px;font-weight:700;color:var(--suave);text-transform:uppercase;letter-spacing:.1em;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.slabel::after{content:'';flex:1;height:1px;background:var(--borde)}
.kg6{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}
.kg4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.kg3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.kg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.kc{background:#fff;border-radius:var(--r);padding:14px 12px 12px;border:1px solid var(--borde);position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.kc.ca::before{background:var(--azul3)}.kc.ct::before{background:var(--teal)}.kc.cq::before{background:var(--turq)}
.kc.cc::before{background:var(--azul2)}.kc.cv::before{background:var(--verde)}.kc.cr::before{background:var(--rojo)}
.kc.cam::before{background:var(--amber)}.kc.cb::before{background:var(--azul)}
.klbl{font-size:9px;font-weight:700;color:var(--suave);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;min-height:22px;line-height:1.3}
.kval{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px}
.kc.ca .kval{color:var(--azul3)}.kc.ct .kval{color:var(--teal)}.kc.cq .kval{color:var(--turq)}
.kc.cc .kval{color:var(--azul2)}.kc.cv .kval{color:var(--verde)}.kc.cr .kval{color:var(--rojo)}
.kc.cam .kval{color:var(--amber)}.kc.cb .kval{color:var(--azul)}
.ksub{font-size:10px;color:var(--suave)}
.pbar{height:4px;background:var(--borde);border-radius:2px;margin-top:7px;overflow:hidden;position:relative}
.pbf{height:100%;border-radius:2px}.pref{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--turq);opacity:.7;border-radius:1px}
.ppct{font-size:9px;color:var(--suave);margin-top:2px}
.bdg{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:3px}
.bok{background:var(--verde-bg);color:var(--verde)}.bwarn{background:var(--amber-bg);color:var(--amber)}.blow{background:var(--rojo-bg);color:var(--rojo)}
.cc2{background:#fff;border-radius:var(--r);padding:16px;border:1px solid var(--borde)}
.cct{font-size:11px;font-weight:700;color:var(--azul);margin-bottom:2px}
.ccs{font-size:10px;color:var(--suave);margin-bottom:10px}
.leg{display:flex;flex-wrap:wrap;gap:8px;font-size:10px;color:var(--texto);margin-bottom:8px}
.leg span{display:flex;align-items:center;gap:4px}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.tcard{background:#fff;border-radius:var(--r);border:1px solid var(--borde);overflow:hidden;margin-top:4px}
.thead{background:linear-gradient(90deg,var(--azul),var(--azul2));padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.thead h3{font-size:13px;font-weight:600;color:#fff}.thead span{font-size:9px;color:var(--cel2);letter-spacing:.06em;text-transform:uppercase}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#EEF6FA;padding:8px 10px;text-align:center;font-weight:700;font-size:9px;color:var(--azul);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--borde);white-space:nowrap}
th.L{text-align:left}
td{padding:7px 10px;border-bottom:1px solid #EEF5F8;text-align:center;color:#2E5E72}
td.L{text-align:left;font-weight:600;color:var(--azul)}
tr:hover td{background:#F4FAFD}
tfoot td{background:linear-gradient(90deg,var(--azul),var(--azul2));color:#fff;font-weight:700;padding:9px 10px;border:none;font-size:11px}
tfoot td.L{color:var(--cel2);text-align:left}
.pok{color:var(--verde);font-weight:700}.pwar{color:var(--amber);font-weight:700}.plow{color:var(--rojo);font-weight:700}
.mny{font-size:12px;font-weight:600}
.hbar-w{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.hbar-i{display:flex;align-items:center;gap:7px}
.hbar-l{font-size:10px;font-weight:600;color:var(--texto);min-width:60px;text-align:right}
.hbar-t{flex:1;height:13px;background:var(--cel3);border-radius:6px;overflow:hidden}
.hbar-f{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px}
.hbar-f span{font-size:8px;font-weight:700;color:#fff}
.rc{border-radius:var(--r);padding:14px;border-left:4px solid transparent;background:#fff;border:1px solid var(--borde)}
.rc.ru{border-left-color:var(--rojo)}.rc.rm{border-left-color:var(--amber)}.rc.ro{border-left-color:var(--verde)}.rc.ri{border-left-color:var(--turq)}
.rt{font-size:11px;font-weight:700;color:var(--azul);margin-bottom:5px}
.rb{font-size:11px;color:#2E5E72;line-height:1.5}
.rtg{display:inline-block;font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;margin-top:6px;text-transform:uppercase}
.ru .rtg{background:var(--rojo-bg);color:var(--rojo)}.rm .rtg{background:var(--amber-bg);color:var(--amber)}
.ro .rtg{background:var(--verde-bg);color:var(--verde)}.ri .rtg{background:var(--cel3);color:var(--azul2)}
@media(max-width:900px){.kg6{grid-template-columns:repeat(3,1fr)}.kg4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.kg6,.kg4,.kg3{grid-template-columns:1fr 1fr}.kg2{grid-template-columns:1fr}.main{padding:12px 10px 36px}}
</style>
</head>

    var pIC2=Math.round(AC.ic/AC.tot*100),pIK2=Math.round(AC.ik/AC.tot*100);
    var csx=document.getElementById('ch_sx');
    if(csx)charts.csx=new Chart(csx,{type:'doughnut',data:{labels:['Hombre '+AC.sexo.H+' ('+pHom+'%)','Mujer '+AC.sexo.M+' ('+pMuj+'%)'],datasets:[{data:[AC.sexo.H,AC.sexo.M],backgroundColor:['#09769F','#A1DAEB'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'bottom',labels:{font:{size:10},color:'#2E7A99',boxWidth:12,padding:8}}}}});
    var ctp=document.getElementById('ch_tp');
    if(ctp)charts.ctp=new Chart(ctp,{type:'doughnut',data:{labels:['CNE '+AC.ic+' ('+pIC2+'%)','Control '+AC.ik+' ('+pIK2+'%)'],datasets:[{data:[AC.ic,AC.ik],backgroundColor:['#0D82A9','#2DA8A8'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'bottom',labels:{font:{size:10},color:'#2E7A99',boxWidth:12,padding:8}}}}});
    var cmi=document.getElementById('ch_mi');
    if(cmi){
      if(cP==='eq'){
        charts.cmi=new Chart(cmi,{type:'line',data:{labels:['Ene','Feb','Mar'],datasets:[
          {label:'JC',data:[72,71,53],borderColor:'#09769F',pointBackgroundColor:'#09769F',pointRadius:5,tension:.3,fill:false,backgroundColor:'transparent'},
          {label:'AC',data:[45,24,40],borderColor:'#2DA8A8',pointBackgroundColor:'#2DA8A8',pointRadius:5,tension:.3,fill:false,backgroundColor:'transparent'},
          {label:'FD',data:[49,8,46],borderColor:'#4BBACC',pointBackgroundColor:'#4BBACC',pointRadius:5,tension:.3,fill:false,backgroundColor:'transparent'},
        ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},color:'#2E7A99',boxWidth:12,padding:8}}},scales:{x:{grid:{color:'#EAF4F8'},ticks:{font:{size:10},color:'#6AAEC4'}},y:{min:0,grid:{color:'#EAF4F8'},ticks:{font:{size:10},color:'#6AAEC4'}}}}});
      } else {
        charts.cmi=new Chart(cmi,{type:'bar',data:{labels:['Enero','Febrero','Marzo'],datasets:[{label:'Inasistencias',data:[AC.mes.Ene,AC.mes.Feb,AC.mes.Mar],backgroundColor:[DATA[cP].col,DATA[cP].col,DATA[cP].col],borderWidth:0,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#EAF4F8'},ticks:{font:{size:10},color:'#6AAEC4'}},y:{min:0,grid:{color:'#EAF4F8'},ticks:{font:{size:10},color:'#6AAEC4'}}}}});
      }
    }
  }

  if(cS==='fin'){
    var cpp=document.getElementById('ch_pp');
    if(cpp)charts.cpp=new Chart(cpp,{type:'bar',data:{labels:['Ene','Feb','Mar'],datasets:[{label:'JC',data:[4.12,5.27,4.53],backgroundColor:'#09769F',borderWidth:0,borderRadius:4},{label:'AC',data:[1.72,3.13,1.41],backgroundColor:'#2DA8A8',borderWidth:0,borderRadius:4},{label:'FD',data:[3.13,1.25,2.97],backgroundColor:'#4BBACC',borderWidth:0,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,grid:{color:'#EAF4F8'},ticks:{font:{size:10},color:'#6AAEC4'}},y:{stacked:true,min:0,grid:{color:'#EAF4F8'},ticks:{font:{size:10},color:'#6AAEC4',callback:function(v){return '$'+v+'M';}}}}}});
    var cpie=document.getElementById('ch_pie');
    if(cpie)charts.cpie=new Chart(cpie,{type:'doughnut',data:{labels:['Carrasco $13.9M (50.6%)','Caballero $6.3M (22.7%)','Durán $7.3M (26.7%)'],datasets:[{data:[13925760,6253200,7347510],backgroundColor:['#09769F','#2DA8A8','#4BBACC'],borderWidth:3,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'50%',plugins:{legend:{position:'bottom',labels:{font:{size:10},color:'#2E7A99',boxWidth:12,padding:8}}}}});
  }
}

// ══ RENDER ══
function render(){
  destroyCharts();
  var pmap={acum:'Ene–Mar · Q1',Ene:'Enero 2026',Feb:'Febrero 2026',Mar:'Marzo 2026'};
  document.getElementById('period-lbl').textContent=pmap[cM]||'';
  var html='';
  if(cS==='prod') html=renderProd();
  else if(cS==='ausen') html=renderAusen();
  else if(cS==='fin') html=renderFin();
  else html=renderRec();
  document.getElementById('cnt').innerHTML=html;
  setTimeout(drawCharts,80);
}
function setProf(p){cP=p;document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});document.getElementById('tab-'+p).classList.add('on');render();}
function setMes(m){cM=m;render();}
function setSec(s){cS=s;document.querySelectorAll('.stab').forEach(function(t){t.classList.remove('on');});document.getElementById('st-'+s).classList.add('on');render();}
render();
</script>
</body>
</html>
